<body>
    <header>
        <div>
            <a href="index.html">Mon portfolio</a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">accueil</a></li>
                <li><a href="Projets.html">Projets</a></li>
                <li><a href="Passions.html">passions</a></li>
                <li><a href="divertissement.html">Divertissement</a></li>
                <li><a href="contacts.html" class="active">contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-page">
        <!-- LE CADRE UNIQUE -->
        <div class="contact-card-unique">
            
            <!-- Côté Gauche : Infos avec fond coloré -->
            <div class="contact-sidebar">
                <h2>Contactez-moi</h2>
                <p>Je suis baseé a lubumbashi, Je vous répondrai avec plaisir.</p>
                
                <div class="info-list">
                    <div class="info-item">
                        <i class="fa-solid fa-location-dot"></i>
                        <span>Lubumbashi, RDC</span>
                    </div>
                    <div class="info-item">
                        <i class="fa-solid fa-phone"></i>
                        <span>0995443375</span>
                    </div>
                </div>

                <div class="quick-links">
                    <a href="https://wa.me" class="social-btn wa"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
                    <a href="https://t.me" class="social-btn tg"><i class="fa-brands fa-telegram"></i> Telegram</a>
                </div>
            </div>

            <!-- Côté Droit : Formulaire -->
            <div class="contact-main-form">
                <form action="#">
                    <div class="input-group">
                        <label>Votre Nom</label>
                        <input type="text" placeholder="Entrez votre nom" required>
                    </div>
                    <div class="input-group">
                        <label>Votre Téléphone</label>
                        <input type="tel" placeholder="Ex: 0995443375" required>
                    </div>
                    <button type="submit" class="send-button">
                        Envoyer le message <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>

        </div>
    </main>

    <footer>
        <p>Monique 2026 tous droits réservés</p>
        <div class="Social-icons">
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
            <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
        </div>
    </footer>
</body>
</html>
